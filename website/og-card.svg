<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c0c14"/>
      <stop offset="1" stop-color="#0a1210"/>
    </linearGradient>
    <linearGradient id="canopy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="glow" x1="600" y1="0" x2="600" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed dark background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle top glow -->
  <rect width="1200" height="320" fill="url(#glow)"/>

  <!-- Thin accent line at top -->
  <rect y="0" width="1200" height="4" fill="#34d399" opacity="0.6"/>

  <!-- Bonsai tree (larger, positioned top-right as a watermark) -->
  <g transform="translate(940, 60) scale(3.2)" opacity="0.12">
    <rect x="14" y="58" width="22" height="2.5" rx="1.2" fill="#34d399"/>
    <path d="M16 60 L17.5 67 Q17.5 68 20 68 L30 68 Q32.5 68 32.5 67 L34 60 Z" fill="#34d399"/>
    <path d="M25 58 C25 52 23 48 22 42 C21 36 24 30 25 26" fill="none" stroke="#34d399" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M23 42 C19 40 15 38 13 34" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
    <path d="M24 36 C28 34 32 32 35 28" fill="none" stroke="#34d399" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M24 30 C21 28 18 26 16 22" fill="none" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/>
    <ellipse cx="25" cy="18" rx="10" ry="9" fill="#34d399"/>
    <ellipse cx="13" cy="28" rx="8" ry="7" fill="#34d399"/>
    <ellipse cx="35" cy="24" rx="7" ry="6.5" fill="#34d399"/>
  </g>

  <!-- Brand -->
  <text x="80" y="100" fill="#34d399" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="22" font-weight="600" letter-spacing="3">BONSAI</text>
  <text x="80" y="128" fill="#555" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="16">bonsai-js</text>

  <!-- Headline -->
  <text x="80" y="240" fill="white" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">Safe expressions</text>
  <text x="80" y="320" fill="white" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">for rules, filters,</text>
  <text x="80" y="400" fill="white" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">and templates.</text>

  <!-- Subtitle -->
  <text x="80" y="468" fill="#777" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="24">Zero-dependency expression engine with sandbox controls and typed API.</text>

  <!-- Bottom badges — minimal, no pill borders -->
  <text x="80" y="564" fill="#34d399" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="16" font-weight="600" letter-spacing="1.5">NO EVAL</text>
  <circle cx="192" cy="559" r="2" fill="#333"/>
  <text x="210" y="564" fill="#555" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="16" font-weight="600" letter-spacing="1.5">ZERO DEPS</text>
  <circle cx="348" cy="559" r="2" fill="#333"/>
  <text x="366" y="564" fill="#555" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="16" font-weight="600" letter-spacing="1.5">TYPESCRIPT</text>
  <circle cx="512" cy="559" r="2" fill="#333"/>
  <text x="530" y="564" fill="#555" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="16" font-weight="600" letter-spacing="1.5">NODE 20+</text>

  <!-- Bottom border accent -->
  <rect y="626" width="1200" height="4" fill="#34d399" opacity="0.3"/>
</svg>
